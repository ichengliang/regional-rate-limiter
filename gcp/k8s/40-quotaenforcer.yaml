# quotaenforcer — data plane (Rust gRPC hot path). 3 replicas baseline, HPA to 10.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotaenforcer
  namespace: ${NAMESPACE}
spec:
  replicas: 3
  selector:
    matchLabels: { app: quotaenforcer }
  template:
    metadata:
      labels: { app: quotaenforcer }
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: quotaenforcer }
      containers:
        - name: quotaenforcer
          image: ${IMAGE_QUOTAENFORCER}
          ports:
            - { name: grpc, containerPort: 8444 }
          env:
            - name: QUOTAENFORCER_ADDR
              valueFrom: { configMapKeyRef: { name: quota-config, key: QUOTAENFORCER_ADDR } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: quota-secret, key: REDIS_URL } }
            - name: PGHOST
              valueFrom: { configMapKeyRef: { name: quota-config, key: PGHOST } }
            - name: PGPORT
              valueFrom: { configMapKeyRef: { name: quota-config, key: PGPORT } }
            - name: PGDATABASE
              valueFrom: { configMapKeyRef: { name: quota-config, key: PGDATABASE } }
            - name: PGUSER
              valueFrom: { configMapKeyRef: { name: quota-config, key: PGUSER } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: quota-secret, key: PGPASSWORD } }
          readinessProbe:
            tcpSocket: { port: 8444 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 8444 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: quotaenforcer
  namespace: ${NAMESPACE}
  annotations:
    cloud.google.com/l4-rbs: "enabled"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector: { app: quotaenforcer }
  ports:
    - { name: grpc, port: 8444, targetPort: 8444, protocol: TCP }
---
# Dynamic scaling for the hot path: 3 -> 10 on CPU.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quotaenforcer
  namespace: ${NAMESPACE}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quotaenforcer
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
