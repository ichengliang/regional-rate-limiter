# Secret values, filled by deploy.sh from Terraform outputs (envsubst) and never
# committed with real values. REDIS_URL embeds the Memorystore AUTH string.
apiVersion: v1
kind: Secret
metadata:
  name: quota-secret
  namespace: ${NAMESPACE}
type: Opaque
stringData:
  PGPASSWORD: "${DB_PASSWORD}"
  # redis://:<auth>@<host>:<port>
  REDIS_URL: "redis://:${REDIS_AUTH}@${REDIS_HOST}:${REDIS_PORT}"
  # Dev platform-admin bearer token for quotamgmt (seeded via QUOTAMGMT_OPTS).
  # The BFF presents the same token as QUOTAMGMT_TOKEN.
  QUOTAMGMT_DEV_TOKEN: "${QUOTAMGMT_DEV_TOKEN}"
